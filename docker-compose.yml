services:
  omp-db:
    image: mariadb:10.11
    container_name: omp-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: omp_root_pass
      MYSQL_DATABASE: omp
      MYSQL_USER: omp
      MYSQL_PASSWORD: omp_pass
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - omp-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  omp-app:
    build:
      # Build context is this repo; the code is COPIED into the image (see Dockerfile).
      context: .
      dockerfile: Dockerfile
    container_name: omp-app
    restart: unless-stopped
    depends_on:
      omp-db:
        condition: service_healthy
    ports:
      - "8081:80"
    volumes:
      # Persist uploaded files across rebuilds (code itself is baked into image).
      - omp-files:/var/www/files

volumes:
  # Fixed names so the data survives regardless of the compose project/dir name.
  omp-db-data:
    name: omp-db-data
  omp-files:
    name: omp-files
